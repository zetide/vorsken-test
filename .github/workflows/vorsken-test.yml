name: Vorsken Policy Gate Test

on:
  pull_request:

permissions:
  pull-requests: write
  contents: read

jobs:
  policy-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: zetide/vorsken@v0.2.5
        with:
          anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
